{{- if .Values.nodeExporter.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.nodeExporter.service.name }}
  namespace: {{ .Values.namespaces.monitoring }}
spec:
  selector:
    app: {{ .Values.nodeExporter.appName }}
  ports:
    - port: {{ .Values.nodeExporter.service.port }}
      targetPort: {{ .Values.nodeExporter.containerPort }}
{{- end }}