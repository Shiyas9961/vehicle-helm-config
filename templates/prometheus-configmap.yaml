{{- if .Values.prometheus.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Values.prometheus.configMapName }}
  namespace: {{ .Values.namespaces.monitoring }}
data:
  prometheus.yml: |
    global:
      scrape_interval: {{ .Values.prometheus.scrapeInterval }}

    scrape_configs:
      - job_name: "node-exporter"
        static_configs:
          - targets:
              - "{{ .Values.nodeExporter.service.name }}.{{ .Values.namespaces.monitoring }}.svc.cluster.local:{{ .Values.nodeExporter.service.port }}"

      - job_name: "kube-state-metrics"
        static_configs:
          - targets:
              - "{{ .Values.kubeStateMetrics.service.name }}.{{ .Values.namespaces.monitoring }}.svc.cluster.local:{{ .Values.kubeStateMetrics.service.port }}"

      - job_name: "vehicle-backend"
        metrics_path: /api/metrics
        static_configs:
          - targets:
              - "{{ .Values.vehicleCore.service.name }}.{{ .Values.namespaces.vehicle }}.svc.cluster.local:{{ .Values.vehicleCore.service.port }}"
{{- end }}