namespaces:
  vehicle: vehicle
  monitoring: monitoring

global:
  ingressClassName: traefik

vehicleCore:
  enabled: true
  name: vehicle-core-service
  deploymentName: vehicle-core-deployment
  configMapName: vehicle-core-config
  appName: vehicle-core-app
  containerName: vehicle-core-container
  replicaCount: 1
  image:
    repository: shiyas9961/vehicle-fast-api
    tag: latest
    pullPolicy: IfNotPresent
  containerPort: 8000
  service:
    name: vehicle-core-service
    type: ClusterIP
    port: 8000
  config:
    postgresHost: "postgres-service"
    postgresPort: "5432"
  probes:
    startup:
      path: /health
      initialDelaySeconds: 30
      periodSeconds: 10
      failureThreshold: 3
      timeoutSeconds: 2
      
    liveness:
      path: /health
      initialDelaySeconds: 30
      periodSeconds: 10
      failureThreshold: 3
      timeoutSeconds: 2

    readiness:
      path: /health
      initialDelaySeconds: 30
      periodSeconds: 5
      failureThreshold: 3
      timeoutSeconds: 2

vehicleUi:
  enabled: true
  deploymentName: vehicle-ui-deployment
  appName: vehicle-ui-app
  containerName: vehicle-ui-container
  replicaCount: 1
  image:
    repository: shiyas9961/vehicle-frontend
    tag: latest
    pullPolicy: IfNotPresent
  containerPort: 80
  service:
    name: vehicle-ui-service
    type: ClusterIP
    port: 80
  probes:
    liveness:
      path: /
      initialDelaySeconds: 30
      periodSeconds: 10
      timeoutSeconds: 2
      failureThreshold: 3
    readiness:
      path: /
      initialDelaySeconds: 30
      periodSeconds: 5
      timeoutSeconds: 2
      failureThreshold: 3

postgres:
  enabled: true
  statefulSetName: postgres-statefulset
  appName: postgres-app
  containerName: postgres
  replicaCount: 1
  containerPort: 5432
  image:
    repository: postgres
    tag: 17-alpine
  service:
    name: postgres-service
    type: ClusterIP
    port: 5432
    headless: true
  persistence:
    volumeName: postgres-data
    accessModes:
      - ReadWriteOnce
    storageClassName: local-path
    size: 1Gi
  sealedSecret:
    enabled: true
    name: postgres-secret
    encryptedData:
      POSTGRES_DB: ""
      POSTGRES_PASSWORD: ""
      POSTGRES_USER: ""

vehicleIngress:
  enabled: true
  name: vehicle-ingress
  paths:
    - path: /
      pathType: Prefix
      serviceName: vehicle-ui-service
      servicePort: 80
    - path: /api
      pathType: Prefix
      serviceName: vehicle-core-service
      servicePort: 8000
    - path: /docs
      pathType: Prefix
      serviceName: vehicle-core-service
      servicePort: 8000
    - path: /openapi.json
      pathType: Prefix
      serviceName: vehicle-core-service
      servicePort: 8000
    - path: /health
      pathType: Prefix
      serviceName: vehicle-core-service
      servicePort: 8000

prometheus:
  enabled: true
  deploymentName: prometheus
  appName: prometheus
  containerName: prometheus
  configMapName: prometheus-config
  replicas: 1
  containerPort: 9090
  scrapeInterval: 15s
  image:
    repository: prom/prometheus
    tag: latest
    pullPolicy: IfNotPresent
  service:
    name: prometheus-service
    port: 9090

grafana:
  enabled: true
  deploymentName: grafana
  appName: grafana
  containerName: grafana
  replicaCount: 1
  containerPort: 3000
  image:
    repository: grafana/grafana
    tag: latest
    pullPolicy: IfNotPresent
  service:
    port: 3000
    name: grafana-service
  env:
    GF_SERVER_ROOT_URL: "%(protocol)s://%(domain)s/grafana"
    GF_SERVER_SERVE_FROM_SUB_PATH: "true"

kubeStateMetrics:
  enabled: true
  name: kube-state-metrics
  appName: kube-state-metrics
  containerName: kube-state-metrics
  replicaCount: 1
  containerPort: 8080
  image:
    repository: registry.k8s.io/kube-state-metrics/kube-state-metrics
    tag: v2.10.0
    pullPolicy: IfNotPresent
  service:
    port: 8080
    name: kube-state-metrics-service

nodeExporter:
  enabled: true
  name: node-exporter
  appName: node-exporter
  containerName: node-exporter
  containerPort: 9100
  hostNetwork: true
  hostPID: true
  image:
    repository: prom/node-exporter
    tag: latest
    pullPolicy: IfNotPresent
  service:
    port: 9100
    name: node-exporter-service

monitoringIngress:
  enabled: true
  name: monitoring-ingress
  paths:
    - path: /grafana
      pathType: Prefix
      serviceName: grafana-service
      servicePort: 3000
    - path: /prometheus
      pathType: Prefix
      serviceName: prometheus-service
      servicePort: 9090

networkPolicy:
  enabled: true
  traefikNamespace: traefik
  kubeSystemNamespace: kube-system
  kubeDnsLabel: kube-dns
  kubernetesApiIp: 10.96.0.1/32